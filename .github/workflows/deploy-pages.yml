# Publie une prévisualisation du site sur GitHub Pages.
# URL : https://blackdorvelus-star.github.io/croc-cake/
# Le site vise croccake.com en production ; pour la prévisualisation sous
# le sous-chemin /croc-cake/, on réécrit les URL racine après le build
# (scripts/rewrite-base.mjs) — le code source reste inchangé.
name: Prévisualisation GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule prévisualisation à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Réécrire les chemins pour le sous-chemin /croc-cake/
        run: node scripts/rewrite-base.mjs
        env:
          PREVIEW_BASE: /croc-cake
      - name: Désactiver Jekyll (sert les dossiers _astro)
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
