# Publie une prévisualisation du site sur GitHub Pages.
# URL : https://blackdorvelus-star.github.io/croc-cake/
#
# Méthode : on construit le site, on réécrit les URL pour le sous-chemin
# /croc-cake/ (scripts/rewrite-base.mjs), puis on pousse le résultat sur la
# branche `gh-pages`. GitHub Pages doit être réglé sur
# « Deploy from a branch » → gh-pages → /(root) (une seule fois, dans
# Settings → Pages). Cette approche évite l'environnement `github-pages` et
# ses règles de protection.
name: Prévisualisation GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Réécrire les chemins pour le sous-chemin /croc-cake/
        run: node scripts/rewrite-base.mjs
        env:
          PREVIEW_BASE: /croc-cake
      - name: Désactiver Jekyll (sert les dossiers _astro)
        run: touch dist/.nojekyll
      - name: Publier sur la branche gh-pages
        run: |
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Déploiement prévisualisation ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
